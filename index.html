<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>My Shop</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Cart</a>
        </nav>
    </header>
<h1>Uday & Dhiru </h1>
    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome to Our Store</h2>
        <p>Best Products at Best Prices</p>
    </section>

    <!-- Product Section -->
    <section class="products">
        <div class="product">
            <img src="https://via.placeholder.com/150" alt="">
            <h3>Product 1</h3>
            <p>₹499</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150" alt="">
            <h3>Product 2</h3>
            <p>₹799</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150" alt="">
            <h3>Product 3</h3>
            <p>₹999</p>
            <button>Add to Cart</button>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Shop | All Rights Reserved</p>
    </footer>

</body>
</html>
